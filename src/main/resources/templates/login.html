<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Login - JobPortal Pro', ~{::content})}">
<body>
<div th:fragment="content" class="container py-5 d-flex justify-content-center">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-person-fill fs-2"></i>
                </div>
                <h2 class="fw-bold text-dark">Welcome Back</h2>
                <p class="text-muted">Login to your account to continue</p>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger py-2">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                You have been logged out.
            </div>

            <form th:action="@{/authenticateTheUser}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="username">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="username" name="username" class="form-control border-start-0 ps-0 text-dark" required placeholder="you@example.com">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" name="password" class="form-control border-start-0 ps-0 text-dark" required placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold fs-5 shadow-sm">Sign In</button>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Don't have an account?</p>
                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <a th:href="@{/register/candidate}" class="text-decoration-none fw-semibold border-end pe-2">Candidate</a>
                        <a th:href="@{/register/recruiter}" class="text-decoration-none fw-semibold ps-1 text-secondary">Recruiter</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

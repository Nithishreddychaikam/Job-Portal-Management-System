<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Manage Applications', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Applicant Tracking</h3>
                <p class="text-muted mb-0">Role: <span th:text="${job.title}" class="text-primary fw-semibold bg-white px-2 py-1 rounded shadow-sm"></span></p>
            </div>
            <a th:href="@{/recruiter/dashboard}" class="btn btn-outline-secondary fw-semibold bg-white shadow-sm"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="ps-4 py-3">Candidate Info</th>
                                <th>Applied On</th>
                                <th>Status Pipeline</th>
                                <th class="text-center">Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(applications)}">
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>
                                    No applications received yet for this role.
                                </td>
                            </tr>
                            <tr th:each="app : ${applications}">
                                <td class="ps-4">
                                    <div class="d-flex flex-column">
                                        <span class="fw-bold text-dark" th:text="${app.candidateName}">John Doe</span>
                                        <small class="text-muted"><i class="bi bi-envelope me-1"></i><span th:text="${app.candidateEmail}"></span></small>
                                    </div>
                                </td>
                                <td class="text-secondary" th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">10 Oct</td>
                                <td>
                                    <form th:action="@{/recruiter/update-status}" method="POST" class="d-flex align-items-center gap-2 m-0">
                                        <input type="hidden" name="applicationId" th:value="${app.id}">
                                        <input type="hidden" name="jobId" th:value="${app.jobId}">
                                        <select name="status" class="form-select form-select-sm w-auto fw-semibold shadow-none" 
                                                th:classappend="${
                                                    app.status != null and app.status.toString() == 'APPLIED' ? 'text-secondary' : 
                                                    (app.status != null and app.status.toString() == 'UNDER_REVIEW' ? 'text-info' : 
                                                    (app.status != null and app.status.toString() == 'SHORTLISTED' ? 'text-primary' : 
                                                    (app.status != null and app.status.toString() == 'INTERVIEW' ? 'text-warning' : 
                                                    (app.status != null and app.status.toString() == 'SELECTED' ? 'text-success' : 'text-danger'))))}"
                                                th:disabled="${app.status != null and (app.status.toString() == 'SELECTED' || app.status.toString() == 'REJECTED')}">
                                            
                                            <option value="" selected disabled>Update Status...</option>
                                            <option value="UNDER_REVIEW">Under Review</option>
                                            <option value="SHORTLISTED">Shortlisted</option>
                                            <option value="INTERVIEW">Interview</option>
                                            <option value="SELECTED">Selected</option>
                                            <option value="REJECTED">Rejected</option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-primary fw-semibold">Save</button>
                                    </form>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/recruiter/candidate-details/{id}(id=${app.userId})}" class="btn btn-sm btn-outline-dark fw-semibold px-3"><i class="bi bi-person-lines-fill me-1"></i>Profile</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// AJAX has been removed in favor of direct form submission.
</script>

</body>
</html>

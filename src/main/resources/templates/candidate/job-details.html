<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Job Breakdown', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <style>
        .card-text, .job-description, .job-skills {
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }
    </style>
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('jobs')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        <div class="mb-4">
            <button onclick="history.back()" class="btn btn-outline-secondary btn-sm fw-semibold mb-3 bg-white"><i class="bi bi-arrow-left me-2"></i>Go Back</button>
            <h3 class="fw-bold mb-0">Role Overview</h3>
        </div>

        <div class="card shadow-sm border-0 mx-auto" style="max-width: 900px;" th:if="${job != null}">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-start border-bottom pb-4 mb-4">
                    <div>
                        <h2 class="fw-bold text-primary mb-2" th:text="${job.title}">Senior Software Engineer</h2>
                        <h5 class="text-muted fw-semibold mb-0"><i class="bi bi-building me-2"></i><span th:text="${job.companyName}">Company</span></h5>
                    </div>
                    <form th:action="@{/candidate/apply/{id}(id=${job.id})}" method="POST" class="m-0">
                        <button type="submit" class="btn btn-lg btn-success fw-bold px-5 shadow"><i class="bi bi-send me-2"></i>Apply Now</button>
                    </form>
                </div>

                <div class="row gx-5 mb-5">
                    <div class="col-md-6 mb-3">
                        <div class="d-flex align-items-center bg-light p-3 rounded">
                            <i class="bi bi-geo-alt-fill text-muted me-3 fs-3"></i>
                            <div>
                                <small class="text-muted d-block fw-semibold text-uppercase">Location</small>
                                <span class="fw-bold fs-5 text-dark" th:text="${job.location}">Remote</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="d-flex align-items-center bg-light p-3 rounded">
                            <i class="bi bi-wallet-fill text-muted me-3 fs-3"></i>
                            <div>
                                <small class="text-muted d-block fw-semibold text-uppercase">Salary Range</small>
                                <span class="fw-bold fs-5 text-dark" th:text="${job.salary ?: 'Not disclosed'}">$100k</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="d-flex align-items-center bg-light p-3 rounded">
                            <i class="bi bi-clock-history text-muted me-3 fs-3"></i>
                            <div>
                                <small class="text-muted d-block fw-semibold text-uppercase">Experience Required</small>
                                <span class="fw-bold fs-5 text-dark" th:text="${job.experienceRequired ?: 'Not Specified'}">3 Years</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="d-flex align-items-center bg-light p-3 rounded">
                            <i class="bi bi-lightning-charge-fill text-warning me-3 fs-3"></i>
                            <div>
                                <small class="text-muted d-block fw-semibold text-uppercase">Key Technologies</small>
                                <span class="fw-bold fs-5 text-dark job-skills" th:text="${job.skillsRequired}">Java</span>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold border-bottom pb-2 mb-3">Detailed Job Description</h5>
                <div class="card p-4">
                    <p class="job-description text-muted lh-lg" th:text="${job.description}">
                        Full text...
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>
</body>
</html>

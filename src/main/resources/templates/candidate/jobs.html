<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Browse Jobs', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('jobs')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        <div class="mb-4">
            <h3 class="fw-bold mb-1">Available Jobs</h3>
            <p class="text-muted mb-0">Discover your next career opportunity.</p>
        </div>

        <!-- Search Bar -->
        <div class="card shadow-sm border-0 mb-4 p-3 bg-white mx-auto">
            <form th:action="@{/candidate/jobs}" method="GET" class="row g-2 align-items-center">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" class="form-control border-start-0" placeholder="Search jobs by title, skills, or location..." th:value="${param.keyword}">
                    </div>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary fw-semibold shadow-sm">Search</button>
                </div>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-warning border-0 shadow-sm text-center py-4">
            <i class="bi bi-search fs-2 d-block mb-2 text-warning"></i>
            No jobs found matching your criteria. Try adjusting your search keywords!
        </div>

        <!-- Job Cards Grid -->
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="job : ${jobs}">
                <div class="card h-100 shadow-sm border-0 job-card">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <h5 class="card-title fw-bold text-primary mb-1" th:text="${job.title}">Job Title</h5>
                                <h6 class="card-subtitle text-muted fw-semibold mb-3"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}">Company</span></h6>
                            </div>
                        </div>

                        <div class="d-flex flex-wrap gap-2 mb-3 text-secondary small fw-medium">
                            <span class="bg-light px-2 py-1 rounded"><i class="bi bi-geo-alt-fill me-1"></i><th:block th:text="${job.location}"></th:block></span>
                            <span class="bg-light px-2 py-1 rounded" th:if="${job.salary != null && !job.salary.isEmpty()}"><i class="bi bi-cash me-1"></i><th:block th:text="${job.salary}"></th:block></span>
                            <span class="bg-light px-2 py-1 rounded"><i class="bi bi-clock-history me-1"></i><th:block th:text="${job.experienceRequired}"></th:block></span>
                        </div>

                        <p class="card-text text-muted flex-grow-1" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;" th:text="${job.description}">
                            Description
                        </p>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1 fw-semibold">Key Skills:</small>
                            <span class="badge bg-secondary me-1" th:text="${job.skillsRequired}">Skills</span>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 pt-0 pb-3">
                        <a th:href="@{/candidate/job/{id}(id=${job.id})}" class="btn btn-outline-primary fw-semibold d-block"><i class="bi bi-eye me-2"></i>View Details</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Verify OTP - JobPortal Pro', ~{::content})}">
<body>
<div th:fragment="content" class="container py-5 d-flex justify-content-center">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 500px;">
        <div class="card-header bg-white border-bottom-0 pt-5 pb-0 text-center">
            <h2 class="fw-bold text-primary mb-1">Verify Email OTP</h2>
            <p class="text-muted">An OTP has been sent to your email.</p>
        </div>
        <div class="card-body p-5 pt-4">
            
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

            <form action="/verify-otp" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="email" th:value="${email}" />
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">Enter OTP</label>
                    <input type="text" name="otp" class="form-control" placeholder="123456" required autofocus>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow mt-2">Verify OTP</button>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>

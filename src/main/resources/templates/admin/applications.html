<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Application Audits', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('applications')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Global Applications Audit</h3>
                <p class="text-muted mb-0">System-wide monitoring of all application pipelines.</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary shadow-sm bg-white"><i class="bi bi-arrow-left me-2"></i>Dashboard</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 table-striped">
                        <thead class="table-dark text-light">
                            <tr>
                                <th class="ps-4">Candidate Entity</th>
                                <th>Target Position</th>
                                <th>Target Company</th>
                                <th>Log Timestamp</th>
                                <th class="text-center">Pipeline State</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(applications)}">
                                <td colspan="5" class="text-center py-5 text-muted">Zero application logs found.</td>
                            </tr>
                            <tr th:each="app : ${applications}">
                                <td class="ps-4 fw-semibold text-dark"><i class="bi bi-person-fill me-2 text-primary"></i><th:block th:text="${app.candidateName}"></th:block></td>
                                <td class="fw-medium text-dark" th:text="${app.jobTitle}">Job Title</td>
                                <td class="text-muted"><i class="bi bi-at me-1"></i><span th:text="${app.companyName}">Company</span></td>
                                <td class="text-muted small fw-medium" th:text="${#temporals.format(app.appliedAt, 'dd MMM yy, HH:mm')}">Date</td>
                                <td class="text-center">
                                    <span class="badge rounded-pill px-3 py-2 fw-bold" 
                                          th:classappend="${app.status == 'APPLIED' ? 'bg-secondary' : (app.status == 'SHORTLISTED' ? 'bg-success' : 'bg-danger')}"
                                          th:text="${app.status}">STATUS</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

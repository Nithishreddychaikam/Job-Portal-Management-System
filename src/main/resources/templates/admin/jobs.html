<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Manage Jobs', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('jobs')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Global Job Postings</h3>
                <p class="text-muted mb-0">Regulate all recruitment postings.</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary shadow-sm bg-white"><i class="bi bi-arrow-left me-2"></i>Dashboard</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 table-striped">
                        <thead class="table-dark text-light">
                            <tr>
                                <th class="ps-4">Job Title</th>
                                <th>Company Entity</th>
                                <th>Geographic Location</th>
                                <th>Launch Date</th>
                                <th class="text-center">Enforcement</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(jobs)}">
                                <td colspan="5" class="text-center py-5 text-muted">No jobs are currently active.</td>
                            </tr>
                            <tr th:each="job : ${jobs}">
                                <td class="ps-4 fw-semibold text-primary" th:text="${job.title}">Title</td>
                                <td class="fw-medium text-dark"><i class="bi bi-building me-2"></i><th:block th:text="${job.companyName}"></th:block></td>
                                <td class="text-muted"><i class="bi bi-geo-alt-fill me-1"></i><span th:text="${job.location}">Location</span></td>
                                <td class="text-muted" th:text="${#temporals.format(job.postedAt, 'dd MMM yyyy')}">Date</td>
                                <td class="text-center">
                                    <a th:href="@{/recruiter/delete-job/{id}(id=${job.id})}" 
                                       class="btn btn-sm btn-danger fw-semibold px-3 shadow-sm"
                                       onclick="return confirm('WARNING: Purge this particular job entity?');"><i class="bi bi-trash-fill me-1"></i>Purge Job</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

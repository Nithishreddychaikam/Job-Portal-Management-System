<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head th:replace="fragments/head :: head(${title})"></head>
<body>

    <!-- Header / Navbar -->
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <!-- Global Alerts Container -->
    <div class="container mt-3" th:if="${success != null || error != null}">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <!-- Unverified Banner Warning -->
    <div sec:authorize="isAuthenticated()" th:if="${!#authentication.principal.verified}" class="container mt-2">
        <div class="alert alert-warning shadow-sm border-warning border-start border-4 d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0 fs-4 me-3 text-warning"></i>
            <div>
                <h6 class="fw-bold mb-1">Please verify your account</h6>
                <div class="mb-0 text-dark">Your account is not verified. Please verify your OTP.</div>
            </div>
        </div>
    </div>

    <!-- Main Content Rendering Area -->
    <div class="main-content">
        <th:block th:replace="${content}"></th:block>
    </div>

    <!-- Footer -->
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Candidate Dashboard', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">My Dashboard</h3>
                <p class="text-muted mb-0">Track your applications and profile status.</p>
            </div>
            <a th:href="@{/candidate/jobs}" class="btn btn-primary shadow-sm"><i class="bi bi-search me-2"></i>Find Jobs</a>
        </div>



        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm h-100 border-0 border-start border-primary border-4 p-3">
                    <h6 class="text-muted text-uppercase fw-semibold mb-2">Total Applied</h6>
                    <h2 class="fw-bold text-primary mb-0" th:text="${#lists.size(applications)}">0</h2>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-list-check me-2 text-primary"></i>Application History</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="ps-4">Job Role</th>
                                <th>Company</th>
                                <th>Applied On</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(applications)}">
                                <td colspan="4" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                    You haven't applied to any jobs yet. <a th:href="@{/candidate/jobs}" class="text-decoration-none fw-semibold">Start exploring</a>.
                                </td>
                            </tr>
                            <tr th:each="app : ${applications}">
                                <td class="ps-4 fw-semibold text-dark" th:text="${app.jobTitle != null ? app.jobTitle : 'N/A'}">Developer</td>
                                <td th:text="${app.companyName != null ? app.companyName : 'N/A'}">Tech Corp</td>
                                <td th:text="${app.appliedAt != null ? #temporals.format(app.appliedAt, 'dd MMM yyyy, HH:mm') : 'N/A'}">10 Oct</td>
                                <td>
                                    <span th:class="'badge px-3 py-2 rounded-pill bg-' + 
                                          (${app.status != null and app.status.toString() == 'APPLIED' ? 'secondary' :
                                            app.status != null and app.status.toString() == 'UNDER_REVIEW' ? 'info text-dark' :
                                            app.status != null and app.status.toString() == 'SHORTLISTED' ? 'primary' :
                                            app.status != null and app.status.toString() == 'INTERVIEW' ? 'warning text-dark' :
                                            app.status != null and app.status.toString() == 'SELECTED' ? 'success' :
                                            app.status != null and app.status.toString() == 'REJECTED' ? 'danger' : 'secondary'})"
                                          th:text="${app.status != null ? #strings.replace(app.status.toString(), '_', ' ') : 'APPLIED'}">
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>



</body>
</html>

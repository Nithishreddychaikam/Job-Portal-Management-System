<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('My Profile', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('profile')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        <div class="mb-4">
            <h3 class="fw-bold mb-1">My Profile</h3>
            <p class="text-muted mb-0">Manage your personal details and resume.</p>
        </div>

        <div class="card shadow-sm border-0 mx-auto" style="max-width: 800px;">
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/candidate/profile}" method="POST" enctype="multipart/form-data">
                    
                    <h5 class="border-bottom pb-2 mb-4 text-primary fw-bold"><i class="bi bi-person-lines-fill me-2"></i>Personal Info</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control bg-light" th:value="${user.name}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control bg-light" th:value="${user.email}" readonly>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mobile Number</label>
                        <input type="text" class="form-control bg-light w-50" th:value="${user.mobile}" readonly>
                    </div>

                    <h5 class="border-bottom pb-2 mb-4 text-primary fw-bold mt-5"><i class="bi bi-tools me-2"></i>Professional Details</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="skills">Skills <span class="text-muted fw-normal">(Comma separated)</span></label>
                        <input type="text" id="skills" name="skills" class="form-control" th:value="${user.skills}" placeholder="e.g. Java, Python, Spring Boot">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" for="experience">Experience <span class="text-muted fw-normal">(Years)</span></label>
                            <input type="text" id="experience" name="experience" class="form-control" th:value="${user.experience}" placeholder="e.g. 3 years">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" for="location">Preferred Location</label>
                            <input type="text" id="location" name="location" class="form-control" th:value="${user.location}" placeholder="e.g. New York, Remote">
                        </div>
                    </div>

                    <h5 class="border-bottom pb-2 mb-4 text-primary fw-bold mt-5"><i class="bi bi-file-earmark-pdf me-2"></i>Resume</h5>
                    
                    <div class="bg-light p-4 rounded text-center border" style="border-style: dashed !important;">
                        <label class="form-label fw-bold text-dark d-block mb-3" for="resume">Upload New Resume (PDF only)</label>
                        <input type="file" id="resume" name="resume" class="form-control w-75 mx-auto" accept="application/pdf">
                        
                        <div th:if="${user.resumeFileId != null}" class="mt-4 pt-3 border-top">
                            <span class="badge bg-success shadow-sm px-3 py-2 fs-6 mb-2 d-inline-block"><i class="bi bi-check-circle me-2"></i>Resume Uploaded</span><br>
                            <a th:href="@{/candidate/download-resume/{id}(id=${user.resumeFileId})}" class="text-decoration-none fw-semibold border-bottom border-primary"><i class="bi bi-download me-1"></i>Download Current Resume</a>
                        </div>
                    </div>

                    <div class="mt-5 text-end border-top pt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm fw-bold">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-briefcase-fill me-2"></i>JobPortal Pro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <!-- Unauthenticated user links -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link fw-semibold" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="!isAuthenticated()">
                    <a class="nav-link dropdown-toggle btn btn-primary text-white px-3 fw-semibold ms-2" href="#" id="registerDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Register
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="registerDropdown">
                        <li><a class="dropdown-item py-2" th:href="@{/register/candidate}"><i class="bi bi-person me-2"></i>As Candidate</a></li>
                        <li><a class="dropdown-item py-2" th:href="@{/register/recruiter}"><i class="bi bi-building me-2"></i>As Recruiter</a></li>
                    </ul>
                </li>

                <!-- Authenticated Links -->
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="nav-link fw-semibold" th:href="@{/admin/dashboard}">Admin Panel</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ROLE_RECRUITER')">
                    <a class="nav-link fw-semibold" th:href="@{/recruiter/dashboard}">Recruiter Dashboard</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ROLE_CANDIDATE')">
                    <a class="nav-link fw-semibold" th:href="@{/candidate/jobs}">Browse Jobs</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_CANDIDATE')">
                    <a class="nav-link fw-semibold" th:href="@{/candidate/dashboard}">My Dashboard</a>
                </li>

                <li class="nav-item dropdown ms-3" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle fw-bold text-dark d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5 me-2 text-primary"></i> <span sec:authentication="principal.name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="userDropdown">
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger py-2 fw-semibold">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Candidate Registration - JobPortal Pro', ~{::content})}">

<body>
<div th:fragment="content" class="container py-5 d-flex justify-content-center">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 650px;">
        <div class="card-header bg-white border-bottom-0 pt-5 pb-0 text-center">
            <h2 class="fw-bold text-primary mb-1">Join as a Candidate</h2>
            <p class="text-muted">Create your profile and start applying to top companies.</p>
        </div>
        <div class="card-body p-5 pt-4">
            <form id="registerForm">
                
                <h5 class="mb-3 border-bottom pb-2 text-dark"><i class="bi bi-person me-2"></i>Personal Details</h5>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Mobile Number</label>
                        <input type="text" id="phoneNumber" class="form-control" required placeholder="9876543210">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john.doe@example.com">
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="Create a strong password">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" required placeholder="Retype password">
                    </div>
                </div>

                <div id="otpSection" style="display:none;" class="mb-4 p-3 border rounded bg-light">
                    <label class="form-label fw-semibold">Enter OTP</label>
                    <div class="d-flex gap-2">
                        <input type="text" id="otpInput" class="form-control" placeholder="123456">
                        <button type="button" class="btn btn-success" onclick="verifyOtp()">Verify</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="resendOtp()">Resend</button>
                    </div>
                </div>

                <button type="button" onclick="registerUser()" id="registerBtn" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow mt-2">Sign Up as Candidate</button>
                
                <div class="text-center mt-4 text-muted">
                    Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-semibold">Login</a>
                </div>
            </form>
        </div>
    </div>

<script>
function registerUser() {
    const data = {
        name: document.getElementById("name").value,
        phoneNumber: document.getElementById("phoneNumber").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        confirmPassword: document.getElementById("confirmPassword").value,
        role: "CANDIDATE"
    };

    fetch("/register/candidate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => {
        if(!res.ok) {
            return res.text().then(text => { throw new Error(text) })
        }
        return res.text();
    })
    .then(msg => {
        alert(msg);
        document.getElementById("registerBtn").style.display = "none";
        document.getElementById("otpSection").style.display = "block";
    })
    .catch(err => {
        alert(err.message);
    });
}

function verifyOtp() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otpInput").value;

    fetch(`/verify-otp?email=${encodeURIComponent(email)}&otp=${encodeURIComponent(otp)}`, {
        method: "POST"
    })
    .then(res => {
        if(!res.ok) {
            return res.text().then(text => { throw new Error(text) })
        }
        return res.text();
    })
    .then(msg => {
        alert(msg);
        if(msg.includes("Verified")) {
            window.location.href = "/login";
        }
    })
    .catch(err => {
        alert(err.message);
    });
}

function resendOtp() {
    const email = document.getElementById("email").value;

    fetch(`/resend-otp?email=${encodeURIComponent(email)}`, {
        method: "POST"
    })
    .then(res => {
        if(!res.ok) {
            return res.text().then(text => { throw new Error(text) })
        }
        return res.text();
    })
    .then(msg => alert(msg))
    .catch(err => alert(err.message));
}
</script>
</div>
</body>
</html>

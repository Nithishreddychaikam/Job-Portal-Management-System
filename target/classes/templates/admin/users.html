<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Manage Users', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Manage Users</h3>
                <p class="text-muted mb-0">View and regulate platform registered accounts.</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary shadow-sm bg-white"><i class="bi bi-arrow-left me-2"></i>Dashboard</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 table-striped">
                        <thead class="table-dark text-light">
                            <tr>
                                <th class="ps-4">Full Name</th>
                                <th>Email Contact</th>
                                <th>Access Role</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="5" class="text-center py-5 text-muted">No users found on the platform.</td>
                            </tr>
                            <tr th:each="u : ${users}">
                                <td class="ps-4 fw-semibold text-dark" th:text="${u.name}">Name</td>
                                <td th:text="${u.email}" class="text-muted">Email</td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${u.role == 'ADMIN' ? 'bg-danger' : (u.role == 'RECRUITER' ? 'bg-primary' : 'bg-success')}"
                                          th:text="${u.role}">ROLE</span>
                                </td>
                                <td>
                                    <span th:if="${u.isVerified}" class="text-success fw-bold"><i class="bi bi-patch-check-fill me-1"></i>Verified</span>
                                    <span th:unless="${u.isVerified}" class="text-warning fw-bold"><i class="bi bi-patch-exclamation-fill me-1"></i>Pending</span>
                                </td>
                                <td class="text-center">
                                    <a th:if="${u.role != 'ADMIN'}" th:href="@{/admin/delete-user/{id}(id=${u.id})}" 
                                       class="btn btn-sm btn-outline-danger fw-semibold px-3" 
                                       onclick="return confirm('WARNING: This permanently deletes the user account. Continue?');"><i class="bi bi-x-circle-fill me-1"></i>Delete</a>
                                    <button th:if="${u.role == 'ADMIN'}" disabled class="btn btn-sm btn-light text-muted border px-3"><i class="bi bi-shield-lock-fill me-1"></i>Protected</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

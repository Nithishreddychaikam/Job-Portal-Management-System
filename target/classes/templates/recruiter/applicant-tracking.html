<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Manage Applications', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Applicant Tracking</h3>
                <p class="text-muted mb-0">Role: <span th:text="${job.title}" class="text-primary fw-semibold bg-white px-2 py-1 rounded shadow-sm"></span></p>
            </div>
            <a th:href="@{/recruiter/dashboard}" class="btn btn-outline-secondary fw-semibold bg-white shadow-sm"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="ps-4 py-3">Candidate Info</th>
                                <th>Applied On</th>
                                <th>Status Pipeline</th>
                                <th class="text-center">Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(applications)}">
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>
                                    No applications received yet for this role.
                                </td>
                            </tr>
                            <tr th:each="app : ${applications}">
                                <td class="ps-4">
                                    <div class="d-flex flex-column">
                                        <span class="fw-bold text-dark" th:text="${app.candidateName}">John Doe</span>
                                        <small class="text-muted"><i class="bi bi-envelope me-1"></i><span th:text="${app.candidateEmail}"></span></small>
                                    </div>
                                </td>
                                <td class="text-secondary" th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">10 Oct</td>
                                <td>
                                    <div class="d-flex flex-column gap-2">
                                        <div class="fw-bold" th:id="'status-' + ${app.id}" th:text="${app.status != null ? app.status.name() : 'APPLIED'}"></div>
                                        <div class="status-buttons d-flex gap-1 flex-wrap">
                                            <button class="btn btn-sm btn-outline-secondary" th:onclick="'updateStatus(\'' + ${app.id} + '\',\'REVIEWED\')'">Reviewed</button>
                                            <button class="btn btn-sm btn-outline-primary" th:onclick="'updateStatus(\'' + ${app.id} + '\',\'SHORTLISTED\')'">Shortlist</button>
                                            <button class="btn btn-sm btn-outline-warning" th:onclick="'updateStatus(\'' + ${app.id} + '\',\'INTERVIEW\')'">Interview</button>
                                            <button class="btn btn-sm btn-outline-success" th:onclick="'updateStatus(\'' + ${app.id} + '\',\'SELECTED\')'">Select</button>
                                            <button class="btn btn-sm btn-outline-danger" th:onclick="'updateStatus(\'' + ${app.id} + '\',\'REJECTED\')'">Reject</button>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/recruiter/candidate-details/{id}(id=${app.userId})}" class="btn btn-sm btn-outline-dark fw-semibold px-3"><i class="bi bi-person-lines-fill me-1"></i>Profile</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toast" style="display:none; position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 15px; border-radius: 5px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); z-index: 9999; font-weight: bold;"></div>

<script>
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",3000);
}

function updateStatus(applicationId, status) {
    fetch('/recruiter/update-status', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'applicationId=' + applicationId + '&status=' + status
    })
    .then(res => {
        if(!res.ok) throw new Error("Error updating");
        return res.text();
    })
    .then(() => {
        showToast("Status updated & Email sent");
        let el = document.getElementById("status-" + applicationId);
        if (el) el.innerText = status;
    })
    .catch(() => showToast("Error updating status"));
}
</script>

</body>
</html>

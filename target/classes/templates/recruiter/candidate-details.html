<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Candidate Details', ~{::content})}">
<body>
<div th:fragment="content" class="d-flex w-100" style="min-height: calc(100vh - 65px);">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <!-- Main Panel -->
    <div class="flex-grow-1 p-4 bg-light overflow-auto">
        <div class="mb-4">
            <button onclick="history.back()" class="btn btn-outline-secondary btn-sm fw-semibold mb-3 bg-white"><i class="bi bi-arrow-left me-2"></i>Go Back</button>
            <h3 class="fw-bold mb-0">Candidate Dossier</h3>
        </div>

        <div class="card shadow-sm border-0 mx-auto" style="max-width: 900px;" th:if="${candidate != null}">
            <div class="card-body p-4 p-md-5">
                <div class="row gx-5">
                    <div class="col-md-7 border-end pe-md-4">
                        <div class="d-flex align-items-center gap-3 mb-4 border-bottom pb-3">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 70px; height: 70px; font-size: 2rem;">
                                <span th:text="${#strings.substring(candidate.name, 0, 1)}">J</span>
                            </div>
                            <div>
                                <h3 class="fw-bold mb-0 text-dark" th:text="${candidate.name}">Name</h3>
                                <p class="text-muted mb-0 fs-5"><i class="bi bi-envelope me-2"></i><span th:text="${candidate.email}">Email</span></p>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="mb-3 d-flex align-items-center">
                                <i class="bi bi-telephone-fill text-muted me-3 fs-5"></i>
                                <div>
                                    <small class="text-muted d-block lh-1">Mobile</small>
                                    <span class="fw-semibold fs-5" th:text="${candidate.mobile}"></span>
                                </div>
                            </div>
                            <div class="mb-3 d-flex align-items-center">
                                <i class="bi bi-geo-alt-fill text-muted me-3 fs-5"></i>
                                <div>
                                    <small class="text-muted d-block lh-1">Location</small>
                                    <span class="fw-semibold fs-5" th:text="${candidate.location ?: 'Location not specified overview'}"></span>
                                </div>
                            </div>
                            <div class="mb-3 d-flex align-items-center">
                                <i class="bi bi-clock-history text-muted me-3 fs-5"></i>
                                <div>
                                    <small class="text-muted d-block lh-1">Experience</small>
                                    <span class="fw-semibold fs-5" th:text="${candidate.experience ?: 'Not specified'}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-5 ps-md-4">
                        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>Skills</h5>
                        <div class="d-flex flex-wrap gap-2 mb-5">
                            <span th:each="skill : ${#strings.arraySplit(candidate.skills ?: '', ',')}" 
                                  class="badge bg-light text-dark border px-3 py-2 fs-6 shadow-sm" th:text="${#strings.trim(skill)}">Skill</span>
                            <span th:if="${candidate.skills == null || candidate.skills.isEmpty()}" class="text-muted fst-italic">No skills listed</span>
                        </div>

                        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-file-earmark-pdf-fill text-danger me-2"></i>Curriculum Vitae</h5>
                        <div class="bg-light rounded p-4 text-center border" th:if="${candidate.resumeFileId != null}">
                            <i class="bi bi-file-pdf text-danger" style="font-size: 3rem;"></i>
                            <div class="mt-3">
                                <a th:href="@{/recruiter/download-resume/{id}(id=${candidate.resumeFileId})}" class="btn btn-primary fw-semibold shadow-sm w-100" target="_blank">
                                    <i class="bi bi-download me-2"></i>Download Resume
                                </a>
                            </div>
                        </div>
                        <div th:if="${candidate.resumeFileId == null}" class="alert alert-warning border text-muted">
                            Candidate has not uploaded a resume yet.
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${candidate == null}" class="alert alert-danger shadow-sm border-0 p-4 mx-auto text-center" style="max-width: 600px;">
            <i class="bi bi-exclamation-triangle-fill fs-2 d-block mb-3"></i>
            Candidate profile not found or does not exist.
        </div>
    </div>
</div>
</body>
</html>
